<html>
<head>
	<style>
	body{
	margine: 0px;
	height: 100vh;
	display: flex; 
	align-items: center;
	justify-content: center;
	background-color: black;
	overflow: hidden;
	background-image:url("https://wallpaperaccess.com/full/1977345.jpg");
	background-repeat:no-repeat;
	border:1px solid red;
	background-position:center;
	background-size:cover;
	background-repeat:no-repeat;
}
	.container{
	font-size: 10px;
	width: 40em;
	height: 40em;
	position: relative;
}
	.sun{
	position: absolute;
	top: 15em;
	left:15em;
	width: 10em;
	height: 10em;
	background-color: yellow;
	border-radius: 50%;
	box-shadow: 0 0 3em white;

}

 

	.earth, .moon {
	position: absolute;
	border-style: solid;
	border-color: white
		 transparent
		 transparent
		 transparent;
	border-width: 0.1em 0.1em 0 0;
	border-radius:50%;
}
@keyframes orbit {
to  {
		transform: rotate(360deg);

}

}

.earth{
	top: 5em;
	left: 5em;
 	width: 30em;
	height: 30em;
	animation: orbit 36.5s linear infinite;
}
.moon{
	top: 0;
	right: 0;
	width: 8em;
	height: 8em;
	animation: orbit 2.7s linear infinite;
}
.earth::before,
.moon::before{
	content: ' ';
	position: absolute;
	border-radius: 50%;
}
.earth::before{
	top: 2.8em;
	right: 2.8em;
	width: 3em;
	height: 3em;
	background-color: aqua;

}
.moon::before{
	top: 0.8em;
	right: 0.2em;
	width: 1.2em;
	height: 1.2em;
	background-color: silver;
}

.heading{
	text-align: center;
	margin:30px 0px;
	color:blue;
	box-shadow:10 10 5 red;
	
}



</style>
</head>
<body>
<div class="container">
<div class="sun">
<span>SUN</span>
</div>
<div class="earth">
<div class="moon">moon</div>
</div>
</div>
<h1 class="heading">Solor Systam</h1>
</body>
</html>
